version: '3.8'

services:
  redis-1:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--port", "6379"]

  redis-2:
    image: redis:7-alpine
    ports:
      - "6380:6380"
    command: ["redis-server", "--port", "6380"]

  redis-3:
    image: redis:7-alpine
    ports:
      - "6381:6381"
    command: ["redis-server", "--port", "6381"]
